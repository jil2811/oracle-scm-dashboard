<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oracle SCM Delivery Copilot Prompt Library</title>
<style>
:root{--acn:#A100FF;--dark:#3C0066;--mid:#7B00CC;--blue:#0078D4;--red:#dc2626;--green:#059669;--ora:#d97706;--purp:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f4f5;color:#333;min-height:100vh}
.w{max-width:1400px;margin:0 auto;padding:16px}
.hdr{background:linear-gradient(135deg,var(--dark),var(--mid) 35%,var(--acn) 65%,#B84DFF);border-radius:12px;padding:24px 28px;color:#fff;margin-bottom:16px}
.brands{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.brands .sep{width:1px;height:22px;background:rgba(255,255,255,.25)}
.acn{font-size:24px;font-weight:700;letter-spacing:1px;position:relative;display:inline-block}
.acn .gt{position:absolute;top:-14px;font-size:14px;font-weight:900;color:#E8DAEF}
.ora-text{font-size:22px;font-weight:800;color:#FF6347;font-family:Arial,sans-serif}
.cp-text{font-size:16px;font-weight:600;opacity:.85}
.ai-badge{font-size:13px;font-weight:700;background:rgba(255,255,255,.12);border-radius:14px;padding:4px 12px}
.hdr h1{font-size:24px;font-weight:800}
.hdr p{font-size:14px;opacity:.8;margin-top:4px}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#e5e7eb;border-radius:8px;padding:3px}
.tab{flex:1;padding:12px 0;border:none;border-radius:6px;font-weight:600;font-size:15px;cursor:pointer;background:transparent;color:#6b7280;transition:all .15s}
.tab.on{background:#fff;color:var(--acn);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.sc{flex:1;min-width:120px;background:#fff;border-radius:8px;padding:14px 16px;text-align:center;border-top:4px solid var(--acn);box-shadow:0 2px 6px rgba(0,0,0,.04)}
.sc .n{font-size:28px;font-weight:800}
.sc .l{font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.sec{background:#fff;border-radius:8px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.sec h3{margin:0 0 10px;font-size:15px;font-weight:700}
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-l{width:110px;font-size:13px;font-weight:600;color:#4b5563;flex-shrink:0}
.bar-bg{flex:1;background:#f3f4f6;border-radius:4px;height:22px;overflow:hidden}
.bar-f{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:22px;transition:width .4s ease}
.bar-f span{font-size:12px;font-weight:700;color:#fff}
.search{width:100%;padding:10px 14px;border-radius:6px;border:1px solid #d1d5db;font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s}
.search:focus{border-color:var(--acn)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filters select{padding:8px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:14px;font-weight:600}
.clr-btn{padding:8px 12px;border-radius:6px;border:none;background:#fee2e2;color:var(--red);font-size:13px;font-weight:600;cursor:pointer}
.count{font-size:13px;color:#6b7280;font-weight:600;margin-bottom:8px}
.card{background:#fff;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:6px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 10px rgba(0,0,0,.06)}
.card-h{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.card-num{width:30px;height:30px;border-radius:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.card-name{font-weight:700;font-size:15px;color:#1f2937;margin-bottom:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-right:2px}
.arrow{color:#9ca3af;font-size:14px;flex-shrink:0;transition:transform .2s}
.card.open .arrow{transform:rotate(180deg)}
.card-b{padding:4px 14px 14px;border-top:1px solid #f3f4f6}
.btn-row{margin-top:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.btn-label{font-size:12px;font-weight:700;color:#4b5563;text-transform:uppercase}
.ai-btns{display:flex;gap:6px;flex-wrap:wrap}
.ai-btn{padding:6px 12px;border-radius:5px;border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.ai-btn:hover{opacity:.85}
.prompt-box{margin-top:8px;background:#faf8ff;border:1px solid #e9e5ff;border-radius:6px;padding:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:#374151;max-height:300px;overflow-y:auto;font-family:Consolas,Monaco,'Courier New',monospace}
.metrics{margin-top:8px;display:flex;gap:12px;padding:8px 10px;background:#f9fafb;border-radius:5px;font-size:14px}
.output{margin-top:6px;padding:8px 10px;background:#f0fdf4;border-radius:5px;font-size:13px;color:#166534}
.mod-hdr{background:var(--acn);color:#fff;padding:8px 14px;border-radius:6px;font-size:15px;font-weight:700;margin:10px 0 6px}
.visio-intro{background:var(--blue);border-radius:8px;padding:16px;color:#fff;margin-bottom:12px}
.visio-intro h2{font-size:18px;font-weight:800;margin-bottom:4px}
.visio-intro p{font-size:14px;opacity:.9}
.step{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--acn);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.step-t{font-weight:700;font-size:15px}
.step-d{font-size:14px;color:#4b5563}
.role{margin-bottom:8px;padding:10px 14px;background:#F5EEF8;border-radius:6px;border-left:4px solid var(--acn)}
.role h4{font-weight:700;font-size:14px;color:var(--acn)}
.role p{font-size:14px;color:#374151}
.footer{text-align:center;padding:16px 0;font-size:12px;color:#9ca3af}
@media(max-width:900px){
  .g2{grid-template-columns:1fr}
  .stats{flex-wrap:wrap}
  .sc{min-width:calc(50% - 8px)}
}
@media(max-width:600px){
  .w{padding:10px}
  .hdr{padding:16px;border-radius:8px}
  .acn{font-size:18px}
  .ora-text{font-size:16px}
  .cp-text{font-size:12px}
  .ai-badge{font-size:10px;padding:3px 8px}
  .hdr h1{font-size:18px}
  .hdr p{font-size:12px}
  .tab{font-size:12px;padding:10px 0}
  .sc{min-width:calc(50% - 6px);padding:10px}
  .sc .n{font-size:22px}
  .sc .l{font-size:9px}
  .bar-l{width:80px;font-size:11px}
  .bar-bg{height:18px}
  .bar-f span{font-size:10px}
  .card-h{padding:10px}
  .card-num{width:26px;height:26px;font-size:11px}
  .card-name{font-size:13px}
  .badge{font-size:9px;padding:1px 5px}
  .ai-btn{padding:5px 8px;font-size:11px}
  .prompt-box{font-size:11px;max-height:200px;padding:8px}
  .filters select{font-size:12px;padding:6px}
  .search{font-size:14px;padding:8px 10px}
  .brands{gap:6px}
  .brands .sep{height:16px}
  .sec h3{font-size:13px}
  .metrics{font-size:12px;flex-wrap:wrap}
  .visio-intro h2{font-size:15px}
  .visio-intro p{font-size:12px}
  .step-t{font-size:13px}
  .step-d{font-size:12px}
  .role h4{font-size:12px}
  .role p{font-size:12px}
}
</style>
</head>
<body>
<div class="w" id="app"></div>
<script>
(function(){
var PH=["Analyze","Design","Build","Test","Deploy","Operate"];
var MD=["Order to Cash","Procure to Pay","Inventory Mgmt","Manufacturing","Planning","Cross-Module"];
var CT=["Documentation","Process Flow","Visio Diagram","Testing","Project Mgmt","Cutover","Reporting"];
var CL={Documentation:"#A100FF","Process Flow":"#2563eb","Visio Diagram":"#0078D4",Testing:"#059669","Project Mgmt":"#d97706",Cutover:"#dc2626",Reporting:"#7c3aed"};
var AI=[
  {n:"M365 Copilot",u:"https://m365.cloud.microsoft/chat",bg:"#0078D4"},
  {n:"ChatGPT",u:"https://chatgpt.com",bg:"#10a37f"},
  {n:"Claude",u:"https://claude.ai",bg:"#d97706"},
  {n:"Gemini",u:"https://gemini.google.com",bg:"#4285F4"}
];

var R="You are a Senior Oracle Fusion Cloud SCM Solution Architect with 25+ years of experience and 15+ end-to-end Oracle Cloud implementation lifecycles across public sector, federal, and commercial clients. You have deep expertise in Oracle Fusion Cloud modules including Order Management, Procurement, Inventory, Manufacturing, Supply Chain Planning, Cost Management, and cross-module integrations.";
var CTX="The client is a mid-size public sector organization implementing Oracle Fusion Cloud SCM. The project follows Oracle's Cloud Implementation Lifecycle methodology (Plan, Analyze, Design, Configure & Build, Test, Deploy, Operate). All outputs must use [CLIENT NAME] and [PROJECT NAME] as placeholders. Use only synthetic data for any examples (e.g., Customer: Acme Public Services, Supplier: SynthCorp-001, Item: AS54888, Warehouse: M1-Seattle).";
var CON="CONSTRAINTS:\n- Do NOT use any real client data\n- Use Oracle Fusion Cloud terminology and navigation paths (not EBS/R12)\n- Include navigation in format: Navigator > Module > Task\n- Professional consulting quality, ready for Microsoft Word\n- Section numbering (1.0, 1.1 format)\n- Include [TO BE CONFIRMED] for client-specific decisions";
var VCON="CONSTRAINTS:\n- Output MUST be a table: Step # | Step Name | Swim Lane | Shape Type | Description | Oracle Navigation | Yes Path | No Path | Integration | Data Object\n- Shape Types: Start (oval), End (oval), Process (rectangle), Decision (diamond), Document, System (double-line rectangle)\n- Every Decision MUST have Yes AND No paths labeled\n- Every manual step MUST have Oracle Fusion navigation path\n- System steps in 'System (Automated)' swim lane\n- Start with Start oval, end with End oval\n- Minimum 25 steps for E2E processes\n- Use Oracle Fusion Cloud standard terminology\n- After table: (1) Swim lane order top-to-bottom with colors, (2) Integration callout boxes, (3) Exception branches";

var PROMPTS=[
{id:1,n:"O2C Functional Design Document (FDD)",c:"Documentation",m:"Order to Cash",p:"Design",t:8,a:1.5,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate a comprehensive Functional Design Document (FDD) for the Order to Cash (O2C) process in Oracle Fusion Cloud.\n\nCONTEXT:\n"+CTX+" Covers full O2C: Sales Order > Booking > Pick > Ship > AutoInvoice > AR Receipt > Revenue Recognition.\n\n"+CON+"\n\nFORMAT:\n1.0 Document Control (version table, author, approver)\n2.0 Executive Summary\n3.0 Business Requirements Overview (reference BR-OTC-001 through BR-OTC-025)\n4.0 Current State Summary (pain points, manual workarounds)\n5.0 Future State Design\n  5.1 Order Management (order types, holds, pricing, scheduling)\n  5.2 Fulfillment (pick release, shipping, delivery)\n  5.3 Receivables (transaction types, AutoInvoice, receipts, revenue recognition)\n6.0 Configuration Decisions (table: Decision ID | Area | Options | Recommendation)\n7.0 Integration Points (table: INT-ID | Source | Target | Direction | Method)\n8.0 Data Conversion (table: Object | Source | Target FBDI | Volume)\n9.0 Security Roles (table: Role | Module | Duties | Job Title)\n10.0 Reporting Requirements\n11.0 Open Issues and Assumptions\n12.0 Appendix: Field Mappings\n\nEXAMPLE:\n\"5.1.1 Order Types:\\n| Order Type | Description | Workflow | Use Case |\\n| Standard | Standard sales order | Book-Pick-Ship-Invoice | Regular orders |\"",e:"12-section FDD with config decisions, integration matrix, and role mappings."},
{id:2,n:"O2C Business Requirements Document (BRD)",c:"Documentation",m:"Order to Cash",p:"Analyze",t:10,a:2,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate a comprehensive BRD for Order to Cash.\n\nCONTEXT:\n"+CTX+"\n\n"+CON+"\n\nFORMAT:\n1.0 Document Control\n2.0 Background and Objectives\n3.0 Scope (In: OM, Pricing, Shipping, AR; Out: Advanced Pricing, Channel Rev Mgmt)\n4.0 Stakeholders\n5.0 Business Requirements (minimum 25)\n6.0 Business Rules\n7.0 Reporting (5+ reports)\n8.0 Interfaces\n9.0 Data Migration\n10.0 Non-Functional\n11.0 Assumptions\n12.0 Glossary",e:"Full BRD with 25+ requirements."},
{id:3,n:"O2C Configuration Workbook (BR100)",c:"Documentation",m:"Order to Cash",p:"Build",t:10,a:2,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate BR100 Configuration Workbook for O2C.\n\nCONTEXT:\n"+CTX+"\n\n"+CON+"\n\nFORMAT:\nTable: Config ID | Module | Setup Area | Item | Oracle Navigation Path | Setup Task | Value | Client Decision | Dependencies | Notes\n\n40+ items across Order Management, Pricing, Shipping, Receivables.",e:"40+ config items with Oracle navigation."},
{id:4,n:"O2C UAT Test Scripts (15 Scripts)",c:"Testing",m:"Order to Cash",p:"Test",t:12,a:2,pr:"ROLE:\nYou are a Senior Oracle Fusion Cloud SCM Test Lead.\n\nTASK:\nCreate 15 detailed UAT test scripts for Order to Cash.\n\nCONTEXT:\n"+CTX+"\n\n15 scenarios covering full O2C lifecycle.",e:"15 test scripts with step-by-step Oracle navigation."},
{id:5,n:"Visio: Standard Sales Order E2E Flow",c:"Visio Diagram",m:"Order to Cash",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" You are also an expert in Visio cross-functional flowcharts.\n\nTASK:\nGenerate a detailed cross-functional swim lane flow for the STANDARD SALES ORDER process.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n29 steps covering full SO lifecycle.",e:"29-step SO flow with exact Oracle navigation."},
{id:6,n:"Visio: Drop Shipment Flow",c:"Visio Diagram",m:"Order to Cash",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate cross-functional flow for DROP SHIPMENT with dual AR/AP parallel streams.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON,e:"Drop ship with parallel AR/AP streams."},
{id:7,n:"Visio: Back-to-Back Order Flow",c:"Visio Diagram",m:"Order to Cash",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate cross-functional flow for BACK-TO-BACK ORDER with Buy vs Make branching.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n25+ steps.",e:"B2B with buy/make decision branching."},
{id:8,n:"Visio: Return (RMA) Flow",c:"Visio Diagram",m:"Order to Cash",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate cross-functional flow for RMA with quality inspection branching.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n20+ steps.",e:"RMA with Accept/Reject/Repair branching."},
{id:9,n:"Visio: Invoice-to-Cash (AR)",c:"Visio Diagram",m:"Order to Cash",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for INVOICE TO CASH subprocess.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON,e:"AR subprocess to GL posting."},
{id:10,n:"Visio: Requisition-to-PO Flow",c:"Visio Diagram",m:"Procure to Pay",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate cross-functional flow for REQUISITION TO PO with multi-level approval.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n30+ steps.",e:"Req-to-PO with multi-level approval."},
{id:11,n:"Visio: Receipt-to-Payment Flow",c:"Visio Diagram",m:"Procure to Pay",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for RECEIPT TO PAYMENT with matching logic.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n25+ steps.",e:"Receipt-to-payment with matching decisions."},
{id:12,n:"Visio: Supplier Returns Flow",c:"Visio Diagram",m:"Procure to Pay",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for RETURN TO SUPPLIER with debit memo.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n15+ steps.",e:"Supplier return with debit memo."},
{id:13,n:"P2P Functional Design Document",c:"Documentation",m:"Procure to Pay",p:"Design",t:8,a:1.5,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate FDD for Procure to Pay.\n\nCONTEXT:\n"+CTX+"\n\n"+CON,e:"Complete P2P FDD."},
{id:14,n:"P2P Configuration Workbook (BR100)",c:"Documentation",m:"Procure to Pay",p:"Build",t:10,a:2,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate BR100 for P2P.\n\nCONTEXT:\n"+CTX+"\n\n"+CON+"\n\n40+ items.",e:"40+ P2P config items."},
{id:15,n:"P2P UAT Test Scripts (15)",c:"Testing",m:"Procure to Pay",p:"Test",t:12,a:2,pr:"ROLE:\nSenior Oracle Fusion Cloud Test Lead.\n\nTASK:\nCreate 15 UAT scripts for P2P.\n\nCONTEXT:\n"+CTX,e:"15 P2P test scripts."},
{id:16,n:"Visio: Receipt to Putaway",c:"Visio Diagram",m:"Inventory Mgmt",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for RECEIPT TO PUTAWAY.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n18+ steps.",e:"Receipt-putaway with inspection."},
{id:17,n:"Visio: Interorg Transfer (Direct+Intransit)",c:"Visio Diagram",m:"Inventory Mgmt",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate TWO flows for INTERORG TRANSFER.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n20+ steps.",e:"Direct and intransit transfer flows."},
{id:18,n:"Visio: Cycle Count Flow",c:"Visio Diagram",m:"Inventory Mgmt",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for CYCLE COUNT.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n20+ steps.",e:"Cycle count with recount loop."},
{id:19,n:"Visio: Physical Inventory Flow",c:"Visio Diagram",m:"Inventory Mgmt",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for PHYSICAL INVENTORY.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n15+ steps.",e:"Physical inventory flow."},
{id:20,n:"Visio: Misc Transactions (4 Sub-Flows)",c:"Visio Diagram",m:"Inventory Mgmt",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate 4 flows for MISC TRANSACTIONS.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON,e:"Four misc transaction flows."},
{id:21,n:"Inventory Management FDD",c:"Documentation",m:"Inventory Mgmt",p:"Design",t:7,a:1.5,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate FDD for Inventory Management.\n\nCONTEXT:\n"+CTX+"\n\n"+CON,e:"Complete Inventory FDD."},
{id:22,n:"Inventory Configuration (BR100)",c:"Documentation",m:"Inventory Mgmt",p:"Build",t:8,a:1.5,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate BR100 for Inventory.\n\nCONTEXT:\n"+CTX+"\n\n"+CON+"\n\n45+ items.",e:"45+ inventory config items."},
{id:23,n:"Inventory UAT Test Scripts (12)",c:"Testing",m:"Inventory Mgmt",p:"Test",t:10,a:1.5,pr:"ROLE:\nSenior Test Lead.\n\nTASK:\nCreate 12 UAT scripts for Inventory.\n\nCONTEXT:\n"+CTX,e:"12 inventory test scripts."},
{id:24,n:"Visio: Discrete Work Order Lifecycle",c:"Visio Diagram",m:"Manufacturing",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for DISCRETE WORK ORDER LIFECYCLE.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n25+ steps.",e:"Complete WO lifecycle."},
{id:25,n:"Visio: Outside Processing (OSP)",c:"Visio Diagram",m:"Manufacturing",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for OUTSIDE PROCESSING.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n15+ steps.",e:"OSP flow."},
{id:26,n:"Visio: Rework and Scrap Flow",c:"Visio Diagram",m:"Manufacturing",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for REWORK AND SCRAP.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n15+ steps.",e:"Scrap and rework flows."},
{id:27,n:"Manufacturing FDD",c:"Documentation",m:"Manufacturing",p:"Design",t:8,a:1.5,pr:"ROLE:\n"+R+"\n\nTASK:\nCreate FDD for Manufacturing.\n\nCONTEXT:\n"+CTX+"\n\n"+CON,e:"Complete Manufacturing FDD."},
{id:28,n:"Manufacturing UAT Test Scripts (10)",c:"Testing",m:"Manufacturing",p:"Test",t:10,a:2,pr:"ROLE:\nSenior Test Lead.\n\nTASK:\nCreate 10 UAT scripts.\n\nCONTEXT:\n"+CTX,e:"10 manufacturing test scripts."},
{id:29,n:"Visio: Demand Planning Cycle",c:"Visio Diagram",m:"Planning",p:"Design",t:4,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for DEMAND PLANNING CYCLE.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n15+ steps.",e:"Demand planning with consensus."},
{id:30,n:"Visio: Supply Planning to Execution",c:"Visio Diagram",m:"Planning",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate flow for SUPPLY PLANNING TO EXECUTION with 3-way branching.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n20+ steps.",e:"Supply plan with 3-way branching."},
{id:31,n:"Visio: Demand-to-Supply E2E",c:"Visio Diagram",m:"Planning",p:"Design",t:5,a:0.75,pr:"ROLE:\n"+R+" Expert in Visio flowcharts.\n\nTASK:\nGenerate END-TO-END DEMAND TO SUPPLY master flow.\n\nCONTEXT:\n"+CTX+"\n\n"+VCON+"\n\n25+ steps.",e:"Master D2S across 4 modules."},

function cardH(d){

  h+='<div class="footer">Oracle SCM Delivery Copilot | Accenture | Public Service Oracle | AI-Enabled Delivery 2026 | Created by: Jil.Sheth@accenture.com | <a href="https://github.com/jil2811/oracle-scm-dashboard" style="color:#9ca3af">GitHub</a></div>';
  appEl.innerHTML=h;
  bindEvents();
}

function bindEvents(){
  var searchBox=document.getElementById("searchBox");
  if(searchBox){searchBox.addEventListener("input",function(){S.q=this.value;render();});}
  var filterCat=document.getElementById("filterCat");
  if(filterCat){filterCat.addEventListener("change",function(){S.fC=this.value;render();});}
  var filterMod=document.getElementById("filterMod");
  if(filterMod){filterMod.addEventListener("change",function(){S.fM=this.value;render();});}
  var filterPh=document.getElementById("filterPh");
  if(filterPh){filterPh.addEventListener("change",function(){S.fP=this.value;render();});}
}

appEl.addEventListener("click",function(e){
  var target=e.target;
  while(target&&target!==appEl){
    var action=target.getAttribute("data-action");
    if(action){
      e.stopPropagation();
      if(action==="tab"){S.tab=target.getAttribute("data-tab");S.openId=null;render();}
      else if(action==="toggle"){var id=parseInt(target.getAttribute("data-id"),10);S.openId=S.openId===id?null:id;render();}
      else if(action==="copy"){
        var id=parseInt(target.getAttribute("data-id"),10);var d=getPrompt(id);
        if(d){navigator.clipboard.writeText(d.pr);target.textContent="\u2713 Copied!";target.style.background="#059669";
        setTimeout(function(){var b=document.getElementById("cp-"+id);if(b){b.textContent="Copy Prompt";b.style.background="#A100FF";}},1500);}
      }
      else if(action==="openai"){
        var id=parseInt(target.getAttribute("data-id"),10);var ainame=target.getAttribute("data-ainame");var aiurl=target.getAttribute("data-aiurl");var d=getPrompt(id);
        if(d){navigator.clipboard.writeText(d.pr);target.textContent="\u2713 Copied & Opening...";target.style.background="#059669";
        var btnId="ai-"+id+"-"+ainame.replace(/\s/g,"");setTimeout(function(){var b=document.getElementById(btnId);if(b){b.textContent=ainame;b.style.background="";}},1500);window.open(aiurl,"_blank");}
      }
      else if(action==="clear"){S.fC="All";S.fM="All";S.fP="All";S.q="";render();}
      return;
    }
    target=target.parentNode;
  }
});

render();
})();
</script>
</body>
</html>
